<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starbucks – Where Every Cup Tells a Story</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #0f2318;
  --green-mid: #1a3d28;
  --green-brand: #00704a;
  --green-accent: #00a862;
  --gold: #c9a84c;
  --white: #ffffff;
}
body {
  margin:0;
  font-family:'Raleway',sans-serif;
  background:var(--green-dark);
  color:white;
}

/* IMAGE FIX */
.drink-img, .menu-img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
}
.drink-img-circle {
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}

.hero {
  display:flex;
  justify-content:space-between;
  padding:40px;
}
.hero-left h1 {
  font-size:50px;
}
.hero-cup img {
  width:220px;
}
.hero-thumb-row {
  display:flex;
  gap:10px;
  margin-top:20px;
}
.hero-thumb {
  border:2px solid #555;
  border-radius:50%;
  padding:5px;
}

.drinks-grid {
  display:flex;
  gap:15px;
  padding:20px;
}
.drink-card {
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  width:150px;
}

.menu-items-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}
.menu-item-card {
  background:#1a3d28;
  padding:10px;
  border-radius:10px;
}

</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-left">
    <h1>Enjoy Your <span style="color:gold">Coffee</span></h1>

    <div class="hero-thumb-row">
      <div class="hero-thumb"><img src="mocha.jpg" class="drink-img-circle"></div>
      <div class="hero-thumb"><img src="coffee.jpg" class="drink-img-circle"></div>
      <div class="hero-thumb"><img src="caramel.jpg" class="drink-img-circle"></div>
      <div class="hero-thumb"><img src="hazel.jpg" class="drink-img-circle"></div>
      <div class="hero-thumb"><img src="masala.jpg" class="drink-img-circle"></div>
    </div>
  </div>

  <div class="hero-cup">
    <img src="mocha.jpg">
  </div>
</section>

<!-- DRINKS -->
<section class="drinks-grid">
  <div class="drink-card">
    <img src="mocha.jpg" class="drink-img">
    <h4>Mocha</h4>
  </div>

  <div class="drink-card">
    <img src="coffee.jpg" class="drink-img">
    <h4>Coffee</h4>
  </div>

  <div class="drink-card">
    <img src="caramel.jpg" class="drink-img">
    <h4>Caramel</h4>
  </div>

  <div class="drink-card">
    <img src="hazel.jpg" class="drink-img">
    <h4>Hazel</h4>
  </div>

  <div class="drink-card">
    <img src="masala.jpg" class="drink-img">
    <h4>Masala</h4>
  </div>
</section>

<!-- MENU -->
<section class="menu-items-grid">
  <div class="menu-item-card">
    <img src="mocha.jpg" class="menu-img">
    <h4>Mocha Latte</h4>
  </div>

  <div class="menu-item-card">
    <img src="coffee.jpg" class="menu-img">
    <h4>Classic Coffee</h4>
  </div>

  <div class="menu-item-card">
    <img src="caramel.jpg" class="menu-img">
    <h4>Caramel Brew</h4>
  </div>

  <div class="menu-item-card">
    <img src="hazel.jpg" class="menu-img">
    <h4>Hazelnut Coffee</h4>
  </div>

  <div class="menu-item-card">
    <img src="masala.jpg" class="menu-img">
    <h4>Masala Chai</h4>
  </div>
</section>

</body>
</html>
