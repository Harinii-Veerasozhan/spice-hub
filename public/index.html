<!DOCTYPE html>
<html>
<head>
<title>Spice Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}

body{
background:#0c3b2e;
color:white;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}
.logo{font-size:22px;font-weight:700;}
.nav-icons{display:flex;gap:15px;cursor:pointer;}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:30px 20px;
flex-wrap:wrap;
}

.hero-text h1{
font-size:48px;
font-weight:900;
}

.hero-text p{
margin:10px 0;
color:#ccc;
}

.hero-text button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#1db954;
color:white;
cursor:pointer;
}

.hero img{
width:250px;
border-radius:20px;
}

/* CATEGORY PILLS */
.categories{
display:flex;
gap:10px;
padding:10px 20px;
overflow-x:auto;
}

.categories button{
padding:10px 20px;
border:none;
border-radius:25px;
background:white;
color:black;
cursor:pointer;
}

.categories .active{
background:#1db954;
color:white;
}

/* HORIZONTAL SCROLL */
.scroll{
display:flex;
gap:15px;
padding:15px 20px;
overflow-x:auto;
}

.card{
min-width:160px;
background:white;
color:black;
border-radius:20px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#1db954;
font-weight:bold;
}

/* BIG BANNER */
.banner{
text-align:center;
font-size:28px;
font-weight:900;
margin:30px 0;
}

/* POPULAR */
.popular{
padding:20px;
}

.popular h2{
margin-bottom:15px;
}

.popular-items{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

/* CONTACT */
.contact{
background:#083024;
padding:25px;
text-align:center;
margin-top:30px;
}

.contact input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

.contact button{
padding:10px 20px;
background:#1db954;
border:none;
color:white;
border-radius:20px;
}

/* MOBILE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;}
.hero img{margin-top:20px;}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">☕ Spice Hub</div>
<div class="nav-icons">
<span onclick="location.href='menu.html'">📋</span>
<span onclick="location.href='cart.html'">🛒</span>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-text">
<h1>WHAT'S YOURS?</h1>
<p>Where every sip tells a story</p>
<button onclick="location.href='menu.html'">Order Now</button>
</div>
<img src="coldcoffee.jpg">
</div>

<!-- CATEGORY -->
<div class="categories">
<button class="active">Drinks</button>
<button>Food</button>
<button>Desserts</button>
<button>Breads</button>
</div>

<!-- SCROLL ITEMS -->
<div class="scroll">
<div class="card"><img src="coldcoffee.jpg"><h4>Cold Coffee</h4><div class="price">₹120</div></div>
<div class="card"><img src="mango.jpg"><h4>Mango Shake</h4><div class="price">₹140</div></div>
<div class="card"><img src="masala.jpg"><h4>Masala Chai</h4><div class="price">₹40</div></div>
<div class="card"><img src="lime.jpg"><h4>Lime Soda</h4><div class="price">₹60</div></div>
</div>

<!-- BANNER -->
<div class="banner">UNMATCHED QUALITY</div>

<!-- POPULAR -->
<div class="popular">
<h2>POPULAR</h2>
<div class="popular-items">
<div class="card"><img src="chick.jpg"><h4>Chicken Biryani</h4></div>
<div class="card"><img src="vegbiri.jpg"><h4>Veg Biryani</h4></div>
<div class="card"><img src="butter.jpg"><h4>Butter Chicken</h4></div>
</div>
</div>

<!-- CONTACT -->
<div class="contact">
<h3>Contact Us</h3>
<p>📞 987654321</p>
</div>

</body>
</html>
