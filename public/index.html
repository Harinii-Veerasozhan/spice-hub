<!DOCTYPE html>
<html>
<head>
<title>Spice Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:url('index.jpg') no-repeat center center fixed;
background-size:cover;
color:white;
}
.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
display:flex;
flex-direction:column;
}
.nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
align-items:center;
}
.logo{
font-size:28px;
font-weight:700;
letter-spacing:2px;
}
.nav div{
cursor:pointer;
font-weight:500;
}
.hero{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h1{
font-size:70px;
font-weight:900;
margin:0;
}
.hero p{
font-size:22px;
margin:20px 0;
}
button{
padding:15px 40px;
margin:10px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff512f,#dd2476);
color:white;
font-size:18px;
cursor:pointer;
transition:0.4s;
}
button:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(255,255,255,0.4);
}
.features{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
background:rgba(0,0,0,0.8);
}
.feature{
text-align:center;
}
</style>
</head>
<body>

<div class="overlay">

<div class="nav">
<div class="logo">Spice Hub</div>
<div onclick="location.href='cart.html'">🛒 Cart</div>
</div>

<div class="hero">
<h1>Luxury Dining Experience</h1>
<p>Fresh Ingredients • Premium Taste • Elegant Ambience</p>
<button onclick="location.href='menu.html'">Explore Menu</button>
<button onclick="location.href='booking.html'">Reserve Table</button>
</div>

<div class="features">
<div class="feature">🍽 Fine Dining</div>
<div class="feature">👨‍🍳 Expert Chefs</div>
<div class="feature">🌿 Fresh & Organic</div>
</div>

</div>

</body>
</html>
