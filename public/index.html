<!DOCTYPE html>
<html>
<head>
<title>Spice Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial;
background:url('index.jpg') no-repeat center/cover;
color:white;
}

.overlay{
background:rgba(0,0,0,0.8);
min-height:100vh;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
padding:15px 20px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.nav div span{
margin:5px 10px;
cursor:pointer;
font-size:14px;
}

/* HERO */
.hero{
text-align:center;
margin-top:80px;
padding:0 15px;
}

.hero h1{
font-size:clamp(28px,6vw,60px);
}

.hero p{
font-size:clamp(14px,3vw,18px);
}

button{
padding:12px;
border:none;
border-radius:25px;
background:#1db954;
color:white;
cursor:pointer;
margin:10px;
width:90%;
max-width:250px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="nav">
<div class="logo">Spice Hub</div>

<div>
<span onclick="location.href='menu.html'">Menu</span>
<span onclick="location.href='booking.html'">Booking</span>
<span onclick="location.href='cart.html'">Cart 🛒</span>
</div>
</div>

<div class="hero">
<h1>Welcome to Spice Hub</h1>
<p>Experience premium dining</p>

<button onclick="location.href='menu.html'">Explore Menu</button>
<button onclick="location.href='booking.html'">Book Table</button>
</div>

</div>

</body>
</html>
