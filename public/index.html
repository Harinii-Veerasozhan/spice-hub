<!DOCTYPE html>
<html>
<head>
<title>Spice Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}
body{background:#0c3b2e;color:white;}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:15px 25px;
align-items:center;
}
.logo{font-size:22px;font-weight:700;}
.nav a{color:white;text-decoration:none;margin:0 10px;}

/* HERO */
.hero{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
padding:40px 25px;
}
.hero-text{max-width:500px;}
.hero-text h1{font-size:clamp(28px,6vw,55px);}
.hero-text p{color:#ddd;margin:10px 0;}
.hero button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#1db954;
color:white;
cursor:pointer;
}
.hero img{width:280px;}

/* CATEGORY */
.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
flex-wrap:wrap;
}
.tabs button{
padding:10px 20px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
}
.tabs .active{background:#1db954;color:white;}

/* PRODUCTS */
.products{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}
.card{
min-width:180px;
background:white;
color:black;
border-radius:20px;
padding:15px;
text-align:center;
}
.card img{width:100px;height:100px;object-fit:cover;}
.price{color:#1db954;font-weight:bold;}

/* BANNER */
.banner{
text-align:center;
font-size:32px;
font-weight:700;
margin:40px 0;
}

/* POPULAR */
.popular{text-align:center;}
.popular-items{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

/* CONTACT */
.contact{
background:#083024;
padding:30px;
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:space-around;
gap:20px;
}
.contact input{
padding:10px;
width:200px;
margin:5px;
}
.contact button{
padding:10px 20px;
background:#1db954;
border:none;
color:white;
}

/* RESPONSIVE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;}
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">☕ Spice Hub</div>
<div>
<a href="menu.html">Menu</a>
<a href="booking.html">Booking</a>
<a href="cart.html">Cart</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-text">
<h1>WHAT'S YOURS?</h1>
<p>Where every dish tells a story.</p>
<button onclick="location.href='menu.html'">Order Now</button>
</div>
<img src="coldcoffee.jpg">
</div>

<!-- TABS -->
<div class="tabs">
<button class="active">Drinks</button>
<button>Food</button>
<button>Desserts</button>
<button>Breads</button>
</div>

<!-- PRODUCTS -->
<div class="products">
<div class="card"><img src="coldcoffee.jpg"><h3>Cold Coffee</h3><div class="price">₹120</div></div>
<div class="card"><img src="mango.jpg"><h3>Mango Shake</h3><div class="price">₹140</div></div>
<div class="card"><img src="masala.jpg"><h3>Masala Chai</h3><div class="price">₹40</div></div>
</div>

<!-- BANNER -->
<div class="banner">UNMATCHED QUALITY</div>

<!-- POPULAR -->
<div class="popular">
<h2>POPULAR</h2>
<div class="popular-items">
<div class="card"><img src="chick.jpg"><h3>Chicken Biryani</h3></div>
<div class="card"><img src="vegbiri.jpg"><h3>Veg Biryani</h3></div>
</div>
</div>

<!-- CONTACT -->
<div class="contact">
<div>
<h3>Contact</h3>
<input placeholder="Name"><br>
<input placeholder="Email"><br>
<button>Submit</button>
</div>

<div>
<h3>Thank You!</h3>
<p>Visit again ❤️</p>
</div>
</div>

</body>
</html>
