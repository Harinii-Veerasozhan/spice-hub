<!DOCTYPE html>
<html>
<head>
<title>Spice Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b3d2e;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.logo{
font-size:22px;
font-weight:700;
}

.nav-icons span{
margin-left:15px;
font-size:20px;
cursor:pointer;
}

/* HERO SECTION */
.hero{
background:#0f4a39;
margin:10px;
border-radius:25px;
padding:30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.hero-text{
max-width:400px;
}

.hero-text h1{
font-size:55px;
font-weight:900;
line-height:1.1;
}

.hero-text p{
margin:15px 0;
color:#dcdcdc;
}

.hero-text button{
padding:12px 30px;
border:none;
border-radius:30px;
background:#1db954;
color:white;
font-size:16px;
cursor:pointer;
}

.hero-img img{
width:280px;
filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

/* CATEGORY SECTION */
.categories{
display:flex;
gap:10px;
padding:15px 20px;
overflow-x:auto;
}

.categories button{
padding:10px 20px;
border:none;
border-radius:25px;
background:white;
color:black;
cursor:pointer;
}

.categories .active{
background:#1db954;
color:white;
}

/* MENU SECTION CARD BLOCK */
.menu-section{
background:#0f4a39;
margin:15px;
border-radius:25px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* SCROLL ITEMS */
.scroll{
display:flex;
gap:15px;
overflow-x:auto;
padding-top:10px;
}

.card{
min-width:170px;
background:white;
color:black;
border-radius:20px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:12px;
}

.price{
color:#1db954;
font-weight:bold;
}

/* BANNER */
.banner{
text-align:center;
font-size:32px;
font-weight:900;
margin:30px 0;
}

/* POPULAR */
.popular{
background:#0f4a39;
margin:15px;
padding:20px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.popular-items{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

/* CONTACT */
.contact{
background:#06281e;
padding:30px;
text-align:center;
margin-top:20px;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

/* MOBILE */
@media(max-width:768px){
.hero{
flex-direction:column;
text-align:center;
}
.hero-text h1{
font-size:36px;
}
.hero-img img{
margin-top:20px;
width:220px;
}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">☕ Spice Hub</div>
<div class="nav-icons">
<span onclick="location.href='menu.html'">📋</span>
<span onclick="location.href='cart.html'">🛒</span>
</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-text">
<h1>WHAT'S<br>YOURS?</h1>
<p>Where every sip tells a story</p>
<button onclick="location.href='menu.html'">Order Now</button>
</div>

<div class="hero-img">
<img src="coffee.jpg">
</div>
</div>

<!-- CATEGORY -->
<div class="categories">
<button class="active">Drinks</button>
<button>Hot</button>
<button>Cold</button>
<button>Special</button>
</div>

<!-- DRINKS SECTION -->
<div class="menu-section">
<h2>Drinks</h2>

<div class="scroll">
<div class="card">
<img src="mocha.jpg">
<h4>Mocha</h4>
<div class="price">₹180</div>
</div>

<div class="card">
<img src="caramel.jpg">
<h4>Caramel</h4>
<div class="price">₹200</div>
</div>

<div class="card">
<img src="hazel.jpg">
<h4>Hazelnut</h4>
<div class="price">₹190</div>
</div>

<div class="card">
<img src="masala.jpg">
<h4>Masala Tea</h4>
<div class="price">₹80</div>
</div>
</div>

</div>

<!-- BANNER -->
<div class="banner">UNMATCHED QUALITY</div>

<!-- POPULAR -->
<div class="popular">
<h2>Popular</h2>

<div class="popular-items">
<div class="card">
<img src="mocha.jpg">
<h4>Mocha Special</h4>
</div>

<div class="card">
<img src="caramel.jpg">
<h4>Caramel Delight</h4>
</div>

<div class="card">
<img src="hazel.jpg">
<h4>Hazelnut Classic</h4>
</div>
</div>

</div>

<!-- CONTACT -->
<div class="contact">
<h3>Contact Us</h3>
<p>📞 987654321</p>
</div>

</body>
</html>
