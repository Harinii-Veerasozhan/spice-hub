<!DOCTYPE html>
<html>
<head>
<title>Cart - Spice Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:'Poppins',sans-serif;
background:#0c3b2e;
color:white;
text-align:center;
padding:30px;
}

button,input,select{
padding:10px;
margin:8px;
width:250px;
border-radius:20px;
border:none;
}

button{
cursor:pointer;
background:linear-gradient(45deg,#1db954,#17a44a);
color:white;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #1db954;
}

.popup{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
background:#083024;
color:white;
padding:30px;
border-radius:15px;
transition:0.3s;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;left:0;
display:none;
}
.overlay.active{display:block;}

.cart-item{
margin:10px 0;
background:#083024;
padding:10px;
border-radius:10px;
}

.back-btn{
background:gray;
}
</style>
</head>

<body>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="totalAmount">0</span></h3>
<button onclick="placeOrder()">Place Order</button>

<div class="overlay" id="overlay"></div>

<!-- Payment Popup -->
<div class="popup" id="paymentPopup">
<h3>Payment</h3>

<select id="paymentMethod" onchange="toggleCard()">
<option value="">Select Payment</option>
<option value="card">Card</option>
<option value="cod">Cash on Delivery</option>
</select>

<div id="cardDetails" style="display:none;">
<input type="text" id="cardNumber" placeholder="Card Number">
<input type="text" id="cardName" placeholder="Card Holder">
<input type="text" id="expiry" placeholder="MM/YY">
<input type="text" id="cvv" placeholder="CVV">
</div>

<button onclick="completePayment()">Pay Now</button>
<button class="back-btn" onclick="closePayment()">Back</button>
</div>

<!-- Success -->
<div class="popup" id="successPopup">
<h3>🎉 Order Placed!</h3>
<p id="orderInfo"></p>
<button onclick="downloadInvoice()">Download Invoice</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let generatedOrderID = "";

function loadCart(){
let container = document.getElementById("cartItems");
container.innerHTML="";
total=0;

cart.forEach(item=>{
total += item.price * item.quantity;
container.innerHTML += `<div class="cart-item">
${item.name} × ${item.quantity} = ₹${item.price * item.quantity}
</div>`;
});

document.getElementById("totalAmount").innerText = total;
}
loadCart();

function placeOrder(){
document.getElementById("paymentPopup").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closePayment(){
document.getElementById("paymentPopup").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function toggleCard(){
let method = document.getElementById("paymentMethod").value;
document.getElementById("cardDetails").style.display =
(method==="card")?"block":"none";
}

function generateOrderID(){
return "ORD"+Math.floor(Math.random()*999999);
}

function completePayment(){
generatedOrderID = generateOrderID();

document.getElementById("paymentPopup").classList.remove("active");
document.getElementById("successPopup").classList.add("active");

document.getElementById("orderInfo").innerText =
"Order ID: "+generatedOrderID+" | ₹"+total;

confetti({particleCount:200,spread:100});

localStorage.removeItem("cart");
cart=[];
}

async function downloadInvoice(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.text("Spice Hub Invoice",20,20);
doc.text("Order ID: "+generatedOrderID,20,40);
doc.text("Amount: ₹"+total,20,50);

doc.save("invoice.pdf");
}
</script>

</body>
</html>
