<!DOCTYPE html>
<html>
<head>
<title>Cart - Spice Hub</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{margin-top:30px;}

.cart-item{
display:flex;
justify-content:space-between;
margin:20px auto;
width:60%;
background:#222;
padding:15px;
border-radius:10px;
}

button{
padding:8px 15px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.checkout{
margin-top:30px;
padding:15px 30px;
background:green;
border:none;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<h1>Your Cart</h1>
<div id="cartContainer"></div>

<h2 id="total"></h2>

<button class="checkout" onclick="checkout()">Proceed to Checkout</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cartContainer");

function renderCart(){
container.innerHTML="";
let total = 0;

cart.forEach((item,index)=>{
total += item.price * item.quantity;

container.innerHTML += `
<div class="cart-item">
<span>${item.name} x ${item.quantity}</span>
<span>₹${item.price * item.quantity}</span>
<button onclick="removeItem(${index})">Remove</button>
</div>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function checkout(){
window.location.href="checkout.html";
}

renderCart();
</script>

</body>
</html>
