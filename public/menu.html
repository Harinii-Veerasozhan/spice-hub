<!DOCTYPE html>
<html>
<head>
<title>Spice Hub - Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0d3b2e;
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
}

.logo{
font-size:26px;
font-weight:700;
}

/* CATEGORY TABS */
.tabs{
display:flex;
justify-content:center;
margin:20px 0;
}

.tabs button{
margin:0 10px;
padding:10px 25px;
border:none;
border-radius:20px;
cursor:pointer;
background:white;
}

.tabs .active{
background:#1db954;
color:white;
}

/* PRODUCTS */
.products{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}

.card{
min-width:220px;
background:white;
color:black;
border-radius:20px;
padding:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
}

.card img{
width:140px;
height:140px;
object-fit:cover;
}

.price{
color:#1db954;
font-weight:bold;
margin:5px 0;
}

button.add{
padding:8px 15px;
border:none;
background:#1db954;
color:white;
border-radius:15px;
cursor:pointer;
}

.added{
background:green !important;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">Spice Hub</div>
<div onclick="location.href='cart.html'">🛒 Cart</div>
</div>

<!-- CATEGORY -->
<div class="tabs">
<button class="active" onclick="showCategory('starters',this)">Starters</button>
<button onclick="showCategory('main',this)">Main</button>
<button onclick="showCategory('beverages',this)">Drinks</button>
<button onclick="showCategory('desserts',this)">Desserts</button>
<button onclick="showCategory('breads',this)">Breads</button>
</div>

<!-- PRODUCTS -->
<div id="menu"></div>

<script>
const imageMap = {
"Paneer Tikka":"panneer.jpg",
"Chicken 65":"c65.jpg",
"Veg Spring Roll":"spring.jpg",
"Gobi Manchurian":"gobi.jpg",
"Fish Fingers":"fishfingers.jpg",

"Butter Chicken":"butter.jpg",
"Veg Biryani":"vegbiri.jpg",
"Chicken Biryani":"chick.jpg",
"Mutton Curry":"mutton.jpg",
"Paneer Butter Masala":"panneerbutter.jpg",

"Fresh Lime Soda":"lime.jpg",
"Cold Coffee":"coldcoffee.jpg",
"Mango Shake":"mango.jpg",
"Masala Chai":"masala.jpg",
"Mineral Water":"mineral.jpg",

"Gulab Jamun":"gulabjamun.jpg",
"Ice Cream":"icecream.jpg",
"Chocolate Brownie":"brownie.jpg",
"Fruit Salad":"fruitsalad.jpg",
"Rasgulla":"rasagulla.jpg",

"Butter Naan":"bnaan.jpg",
"Garlic Naan":"gnaan.jpg",
"Tandoori Roti":"troti.jpg",
"Veg Combo":"veg combo.jpg",
"Chicken Combo":"chickencombo.jpg"
};

const data = {
starters:[
["Paneer Tikka",180],
["Chicken 65",220],
["Veg Spring Roll",150],
["Gobi Manchurian",160],
["Fish Fingers",240]
],
main:[
["Butter Chicken",320],
["Veg Biryani",220],
["Chicken Biryani",280],
["Mutton Curry",350],
["Paneer Butter Masala",250]
],
beverages:[
["Fresh Lime Soda",60],
["Cold Coffee",120],
["Mango Shake",140],
["Masala Chai",40],
["Mineral Water",20]
],
desserts:[
["Gulab Jamun",90],
["Ice Cream",80],
["Chocolate Brownie",120],
["Fruit Salad",100],
["Rasgulla",90]
],
breads:[
["Butter Naan",40],
["Garlic Naan",50],
["Tandoori Roti",30],
["Veg Combo",299],
["Chicken Combo",399]
]
};

function showCategory(category,btn){
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let html = `<div class="products">`;

data[category].forEach(item=>{
html += `
<div class="card">
<img src="${imageMap[item[0]]}">
<h3>${item[0]}</h3>
<div class="price">₹${item[1]}</div>
<button class="add" onclick="addToCart(this,'${item[0]}',${item[1]})">Add</button>
</div>
`;
});

html += `</div>`;
document.getElementById("menu").innerHTML = html;
}

function addToCart(btn,name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(i=>i.name===name);
if(existing){ existing.quantity += 1; }
else{ cart.push({name,price,quantity:1}); }

localStorage.setItem("cart",JSON.stringify(cart));

btn.innerText="✓ Added";
btn.classList.add("added");
btn.disabled=true;
}

// default load
showCategory("starters",document.querySelector(".tabs button"));
</script>

</body>
</html>
