<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0c3b2e;color:white;}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:15px;
}

/* TABS */
.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
flex-wrap:wrap;
}
.tabs button{
padding:10px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
}
.tabs .active{background:#1db954;color:white;}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}
.card{
width:180px;
background:white;
color:black;
border-radius:20px;
padding:15px;
text-align:center;
}
.card img{width:100px;height:100px;object-fit:cover;}
.price{color:#1db954;font-weight:bold;}
button{
background:#1db954;
border:none;
padding:8px;
color:white;
border-radius:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
<h2>☕ Spice Hub</h2>
<div onclick="location.href='cart.html'">🛒</div>
</div>

<div class="tabs">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('drinks',this)">Drinks</button>
<button onclick="filter('food',this)">Food</button>
<button onclick="filter('desserts',this)">Desserts</button>
<button onclick="filter('breads',this)">Breads</button>
</div>

<div class="products">

<div class="card" data="drinks">
<img src="coldcoffee.jpg">
<h3>Cold Coffee</h3>
<div class="price">₹120</div>
<button onclick="add('Cold Coffee',120)">Add</button>
</div>

<div class="card" data="food">
<img src="chick.jpg">
<h3>Chicken Biryani</h3>
<div class="price">₹280</div>
<button onclick="add('Chicken Biryani',280)">Add</button>
</div>

<div class="card" data="desserts">
<img src="gulabjamun.jpg">
<h3>Gulab Jamun</h3>
<div class="price">₹90</div>
<button onclick="add('Gulab Jamun',90)">Add</button>
</div>

<div class="card" data="breads">
<img src="bnaan.jpg">
<h3>Butter Naan</h3>
<div class="price">₹40</div>
<button onclick="add('Butter Naan',40)">Add</button>
</div>

</div>

<script>
function filter(cat,btn){
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

document.querySelectorAll(".card").forEach(c=>{
if(cat==="all"||c.getAttribute("data")===cat){
c.style.display="block";
}else{
c.style.display="none";
}
});
}

function add(name,price){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
cart.push({name,price,quantity:1});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added!");
}
</script>

</body>
</html>
