<!DOCTYPE html>
<html>
<head>
<title>Spice Hub - Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial;
background:#0d3b2e;
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
padding:15px 20px;
}

.logo{font-size:22px;}

/* TABS */
.tabs{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin:20px;
}

.tabs button{
padding:8px 15px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
font-size:12px;
}

.tabs .active{
background:#1db954;
color:white;
}

/* PRODUCTS */
.products{
display:flex;
overflow-x:auto;
gap:15px;
padding:15px;
scroll-snap-type:x mandatory;
}

.card{
min-width:180px;
flex:0 0 auto;
scroll-snap-align:start;
background:white;
color:black;
border-radius:15px;
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:auto;
}

.price{
color:#1db954;
font-weight:bold;
}

button.add{
padding:8px;
border:none;
background:#1db954;
color:white;
border-radius:15px;
cursor:pointer;
}

@media(min-width:768px){
.card{min-width:220px;}
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">Spice Hub</div>
<div onclick="location.href='cart.html'">🛒 Cart</div>
</div>

<div class="tabs">
<button class="active" onclick="showCategory('starters',this)">Starters</button>
<button onclick="showCategory('main',this)">Main</button>
<button onclick="showCategory('beverages',this)">Drinks</button>
<button onclick="showCategory('desserts',this)">Desserts</button>
<button onclick="showCategory('breads',this)">Breads</button>
</div>

<div id="menu"></div>

<script>
const data={
starters:[["Paneer Tikka",180],["Chicken 65",220]],
main:[["Butter Chicken",320],["Veg Biryani",220]],
beverages:[["Cold Coffee",120],["Mango Shake",140]],
desserts:[["Ice Cream",80],["Brownie",120]],
breads:[["Butter Naan",40],["Garlic Naan",50]]
};

function showCategory(cat,btn){
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let html='<div class="products">';
data[cat].forEach(i=>{
html+=`<div class="card">
<h3>${i[0]}</h3>
<div class="price">₹${i[1]}</div>
<button class="add">Add</button>
</div>`;
});
html+='</div>';

document.getElementById("menu").innerHTML=html;
}

showCategory("starters",document.querySelector(".tabs button"));
</script>

</body>
</html>
