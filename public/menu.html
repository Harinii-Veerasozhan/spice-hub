<!DOCTYPE html>
<html>
<head>
<title>Spice Hub Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#0d3b2e;
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:15px 30px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.tabs button{
padding:10px 20px;
border:none;
border-radius:20px;
background:white;
cursor:pointer;
}

.tabs .active{
background:#1db954;
color:white;
}

/* PRODUCTS */
.products{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}

.card{
min-width:220px;
background:white;
color:black;
border-radius:20px;
padding:15px;
text-align:center;
}

.card img{
width:120px;
}

.price{
color:#1db954;
font-weight:bold;
}

button{
padding:8px 15px;
border:none;
background:#1db954;
color:white;
border-radius:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
<h2>☕ Spice Hub</h2>
<div onclick="location.href='cart.html'">🛒</div>
</div>

<div class="tabs">
<button class="active" onclick="show('starters',this)">Starters</button>
<button onclick="show('main',this)">Main</button>
<button onclick="show('drinks',this)">Drinks</button>
<button onclick="show('desserts',this)">Desserts</button>
</div>

<div id="menu"></div>

<script>
const data={
starters:[["Paneer Tikka",180],["Chicken 65",220]],
main:[["Butter Chicken",320],["Veg Biryani",220]],
drinks:[["Cold Coffee",120],["Mango Shake",140]],
desserts:[["Ice Cream",80],["Brownie",120]]
};

function show(cat,btn){
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let html='<div class="products">';
data[cat].forEach(i=>{
html+=`
<div class="card">
<img src="coffee.png">
<h3>${i[0]}</h3>
<div class="price">₹${i[1]}</div>
<button onclick="add('${i[0]}',${i[1]})">Add</button>
</div>`;
});
html+='</div>';

document.getElementById("menu").innerHTML=html;
}

function add(name,price){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
cart.push({name,price,quantity:1});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added!");
}

show("starters",document.querySelector(".tabs button"));
</script>

</body>
</html>
